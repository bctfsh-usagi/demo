<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Tamagotchi · 라일락 토끼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=SUIT:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fef6ff;
      --screen: #f8f1ff;
      --border: #d6c5ff;
      --pixel1: #ff9dc7;
      --pixel2: #c89bff;
      --pixel3: #ffd27f;
      --text: #4a3d6c;
      --button: #c0b0ff;
      --button-dark: #a392f9;
      --danger: #ff8fb6;
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:'SUIT','Apple SD Gothic Neo','Malgun Gothic',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
    .console { width:min(440px,92vw); background:var(--screen); border:6px solid var(--border); border-radius:32px; padding:26px; box-shadow:0 22px 50px rgba(74,61,108,0.15); }
    h1 { font-family:'Press Start 2P',cursive; font-size:18px; text-align:center; margin:0 0 6px; }
    .meta { text-align:center; font-size:13px; color:var(--text); margin-bottom:18px; }
    .hud { display:flex; justify-content:space-between; margin-bottom:16px; font-size:14px; }
    .hud span { background:#fff; border-radius:18px; padding:6px 12px; border:1px solid var(--border); }
    .pixel-pet { width:200px; height:200px; margin:0 auto 18px; image-rendering:pixelated; background:#fff; border:1px solid var(--border); border-radius:24px; display:block; object-fit:contain; }
    .pixel-pet div { width:100%; padding-top:100%; background:transparent; border-radius:4px; }
    .p1 { background: var(--pixel1); }
    .p2 { background: var(--pixel2); }
    .p3 { background: var(--pixel3); }
    .status { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; font-size:14px; }
    .status-label { font-size:12px; color:var(--text); margin-bottom:4px; display:flex; justify-content:space-between; }
    .bar { background:#fff; border:1px solid var(--border); border-radius:12px; height:12px; overflow:hidden; }
    .bar-fill { height:100%; background:linear-gradient(90deg,var(--button),var(--button-dark)); transition:width .3s ease; }
    .actions { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; }
    button { border:none; padding:12px; border-radius:18px; background:var(--button); color:var(--text); font-weight:600; cursor:pointer; transition:transform .1s, opacity .2s; }
    button:active { transform:translateY(2px); }
    button:disabled { opacity:.4; cursor:not-allowed; }
    .log { margin-top:18px; background:#fff; border-radius:16px; border:1px dashed var(--border); padding:14px; font-size:13px; min-height:70px; }
  </style>
</head>
<body>
  <div class="console">
    <h1>Pastel Tamagotchi</h1>
    <div class="meta">라일락 토끼와 함께하는 다정한 하루</div>
    <div class="hud">
      <span id="level">Lv.1</span>
      <span id="exp">EXP 0 / 80</span>
      <span id="stars">⭐ 20</span>
    </div>
    <img class="pixel-pet" id="petImage" alt="라일락 토끼" />
    <div class="status">
      <div>
        <div class="status-label">배고픔 <span id="stat-hunger">70</span></div>
        <div class="bar"><div class="bar-fill" id="hunger"></div></div>
      </div>
      <div>
        <div class="status-label">기분 <span id="stat-mood">80</span></div>
        <div class="bar"><div class="bar-fill" id="mood"></div></div>
      </div>
      <div>
        <div class="status-label">에너지 <span id="stat-energy">75</span></div>
        <div class="bar"><div class="bar-fill" id="energy"></div></div>
      </div>
      <div>
        <div class="status-label">청결 <span id="stat-clean">85</span></div>
        <div class="bar"><div class="bar-fill" id="clean"></div></div>
      </div>
    </div>
    <div class="actions">
      <button data-action="feed">간식 주기 (-2⭐ +10 EXP)</button>
      <button data-action="play">놀아주기 (-3⭐ +12 EXP)</button>
      <button data-action="rest">낮잠 (-1⭐ +8 EXP)</button>
      <button data-action="clean">세수시키기 (-2⭐ +10 EXP)</button>
    </div>
    <div class="log" id="log">라일락 토끼가 당신을 기다리고 있어요.</div>
  </div>

  <script>
    const petImage = document.getElementById('petImage');
    const logBox = document.getElementById('log');
    const levelEl = document.getElementById('level');
    const expEl = document.getElementById('exp');
    const starEl = document.getElementById('stars');
    const statText = {
      hunger: document.getElementById('stat-hunger'),
      mood: document.getElementById('stat-mood'),
      energy: document.getElementById('stat-energy'),
      clean: document.getElementById('stat-clean')
    };
    const fillEls = {
      hunger: document.getElementById('hunger'),
      mood: document.getElementById('mood'),
      energy: document.getElementById('energy'),
      clean: document.getElementById('clean')
    };

    
    function renderPet(level = 1) {
      petImage.src = levelImages[level] || levelImages[1];
    }

    const state = {
      stats: { hunger:70, mood:80, energy:75, clean:85 },
      level: 1,
      exp: 0,
      stars: 20
    };

    const cost = { feed: {star:2, exp:10}, play: {star:3, exp:12}, rest: {star:1, exp:8}, clean: {star:2, exp:10} };

    function updateBars() {
      Object.keys(state.stats).forEach(key => {
        const value = Math.max(0, Math.min(100, state.stats[key]));
        state.stats[key] = value;
        fillEls[key].style.width = value + '%';
        statText[key].textContent = value;
      });
      levelEl.textContent = `Lv.${state.level}`;
      expEl.textContent = `EXP ${state.exp} / ${(state.level*60)+20}`;
      starEl.textContent = `⭐ ${state.stars}`;
      const mood = Object.values(state.stats).reduce((a,b)=>a+b,0)/4;
      logBox.textContent = mood > 75 ? '토끼가 콧노래를 부르며 행복해해요.' : mood > 45 ? '조금 심심한가봐요. 함께 놀아줄까요?' : '위험! 지금 바로 돌봐줘야 할 것 같아요!';
      document.querySelectorAll('.actions button').forEach(btn => {
        const action = btn.dataset.action;
        const need = cost[action].star;
        btn.disabled = state.stars < need;
      });
    }

    function gainExp(amount) {
      state.exp += amount;
      const threshold = (state.level*60) + 20;
      if (state.exp >= threshold) {
        state.exp -= threshold;
        state.level = Math.min(3, state.level + 1);
        renderPet(state.level);
        logBox.textContent = `레벨 업! 라일락 토끼가 새로운 빛을 얻었어요. (Lv.${state.level})`;
      }
    }

    document.querySelectorAll('.actions button').forEach(btn => {
      btn.addEventListener('click', () => {
        const { action } = btn.dataset;
        if (state.stars < cost[action].star) return;
        state.stars -= cost[action].star;
        if (action === 'feed') { state.stats.hunger += 18; state.stats.clean -= 5; }
        if (action === 'play') { state.stats.mood += 16; state.stats.energy -= 8; }
        if (action === 'rest') { state.stats.energy += 20; state.stats.mood += 5; }
        if (action === 'clean') { state.stats.clean += 22; state.stats.mood += 6; }
        gainExp(cost[action].exp);
        updateBars();
      });
    });

    setInterval(() => {
      state.stats.hunger -= 2;
      state.stats.mood -= 1;
      state.stats.energy -= 1;
      state.stats.clean -= 1;
      state.stars += 1;
      updateBars();
    }, 3500);

    renderPet(state.level);
    updateBars();
  </script>
</body>
</html>
